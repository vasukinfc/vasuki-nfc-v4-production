<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Customer Panel — Vasuki NFC</title><link rel="stylesheet" href="../css/style.css"><link rel="manifest" href="../manifest.json"></head><body><div class="wrap"><div class="nav"><div class="brand"><div class="logo">V</div>Customer Panel</div><div><button class="btn secondary hide" id="installBtn" onclick="installApp()">Install App</button> <button class="btn danger" id="logout">Logout</button></div></div><div class="grid two"><div class="card"><h2>Edit Your Card</h2><p id="planBox" class="notice">Loading plan...</p><form id="profileForm"><div class="row"><label>Name<input name="name"></label><label>Business Name<input name="businessName"></label></div><div class="row"><label>Mobile 1<input name="mobile1"></label><label>Mobile 2<input name="mobile2"></label></div><div class="row"><label>WhatsApp<input name="whatsapp"></label><label>Email<input name="email"></label></div><div class="row"><label>Website URL<input name="websiteUrl"></label><label>Google Map URL<input name="mapUrl"></label></div><div class="row"><label>Profile Image URL<input name="profileUrl"></label><label>Background Image URL<input name="backgroundUrl"></label></div><div class="row"><label>Logo URL<input name="logoUrl"></label><label>Payment QR URL<input name="paymentQrUrl"></label></div><label>Address<textarea name="address"></textarea></label><label>About Business<textarea name="about"></textarea></label><label>Services - one per line<textarea name="services"></textarea></label><label>Product Image URLs - one per line, max 10<textarea name="productImageUrls"></textarea></label><label>Business Hours<textarea name="businessHours"></textarea></label><div class="row"><label>Instagram URL<input name="instagram"></label><label>Facebook URL<input name="facebook"></label></div><div class="row"><label>YouTube URL<input name="youtube"></label><label>LinkedIn URL<input name="linkedin"></label></div><label>Theme<select name="theme" id="themeSelect"></select></label><button class="btn">Save Card</button> <a class="btn secondary" id="viewCard" target="_blank">View Public Card</a></form></div><div><div class="card"><h2>Live Preview</h2><div id="preview"></div></div><div class="card" style="margin-top:16px"><h2>Your Analytics</h2><div class="grid three"><div><h2 id="views">0</h2><p class="muted">Views</p></div><div><h2 id="calls">0</h2><p class="muted">Calls</p></div><div><h2 id="whatsappClicks">0</h2><p class="muted">WhatsApp</p></div></div></div></div></div></div><script type="module">
import{db,ref,get,update,CUSTOMER_KEY,requireCustomer,getSettings,toast,formData,sanitizeCustomer,renderMiniCard,themeOptions,expired,daysLeft,installPrompt}from'../js/app.js';
const username=requireCustomer(); let customer={},settings={}; installPrompt();
logout.onclick=()=>{localStorage.removeItem(CUSTOMER_KEY);location.href='../customer-login.html'};
async function load(){settings=await getSettings();const snap=await get(ref(db,'customers/'+username));if(!snap.exists()){toast('Customer not found');return}customer=snap.val();Object.keys(customer).forEach(k=>{if(profileForm[k])profileForm[k].value=customer[k]||''});
                      themeSelect.innerHTML = themeOptions(customer.theme || settings.defaultTheme || 'gold');
                      viewCard.href='../card/?u='+encodeURIComponent(username);planBox.innerHTML=`Plan: ${customer.planCurrency||settings.currency}${customer.planPrice||settings.planPrice}/year • Expiry: <b>${customer.expiryDate||'-'}</b> • ${daysLeft(customer.expiryDate)} days left`;if(expired(customer.expiryDate)||customer.status==='inactive'){planBox.innerHTML+=' <br><b>Card expired/locked. Renewal ke liye Vasuki NFC se contact karein.</b>'}renderPreview();loadAnalytics()}load();
function renderPreview(){const d={...customer,...formData(profileForm)};preview.innerHTML=renderMiniCard(d,settings)}
profileForm.oninput=renderPreview;
profileForm.onsubmit=async e=>{e.preventDefault();if(expired(customer.expiryDate)||customer.status==='inactive')return toast('Account expired/locked');const data=sanitizeCustomer(formData(profileForm));data.updatedAt=new Date().toISOString();await update(ref(db,'customers/'+username),data);toast('Saved');load()};
async function loadAnalytics(){const a=(await get(ref(db,'analytics/'+username))).val()||{};views.textContent=a.views||0;calls.textContent=a.callClicks||0;whatsappClicks.textContent=a.whatsappClicks||0}
</script></body></html>
