<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Customer Login — Vasuki NFC</title><link rel="stylesheet" href="css/style.css"></head><body><div class="wrap" style="max-width:520px"><div class="nav"><div class="brand"><div class="logo">V</div>Customer Login</div></div><div class="card"><p class="notice">Admin se mila username/password enter karo.</p><form id="login"><label>Username<input name="u" required></label><label>Password<input name="p" type="password" required></label><button class="btn" style="width:100%">Login</button></form></div></div><script type="module">import{db,ref,get,CUSTOMER_KEY,cleanUsername,sha,formData,toast,expired}from'./js/app.js';login.onsubmit=async e=>{e.preventDefault();const d=formData(login),u=cleanUsername(d.u);const snap=await get(ref(db,'customers/'+u));if(!snap.exists())return toast('Customer not found');const c=snap.val();if(c.status==='inactive')return toast('Account locked');const hash=await sha(d.p);if(hash!==c.passwordHash)return toast('Wrong password');localStorage.setItem(CUSTOMER_KEY,u);location.href='customer/'};</script></body></html>
