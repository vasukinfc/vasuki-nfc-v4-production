<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login — Vasuki NFC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrap" style="max-width:520px">
    <div class="nav">
      <div class="brand"><div class="logo">V</div>Admin Login</div>
    </div>

    <div class="card">
      <p class="notice">Secure Admin Login</p>

      <form id="login">
        <label>Email
          <input name="email" type="email" autocomplete="username" required>
        </label>

        <label>Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button class="btn" style="width:100%">Login</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { ADMIN_KEY, ADMIN_EMAIL, toast } from './js/app.js';
    import { auth, signInWithEmailAndPassword } from './firebase.js';

    login.onsubmit = async e => {
      e.preventDefault();

      const email = login.email.value.trim();
      const password = login.password.value;

      if (email !== ADMIN_EMAIL) {
        toast('Only admin email allowed');
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        localStorage.setItem(ADMIN_KEY, 'yes');
        location.href = 'admin/';
      } catch (err) {
        console.error(err);
        toast('Wrong Email or Password');
      }
    };
  </script>
</body>
</html>
