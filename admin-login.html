<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login — Vasuki NFC</title><link rel="stylesheet" href="css/style.css"></head><body><div class="wrap" style="max-width:520px"><div class="nav"><div class="brand"><div class="logo">V</div>Admin Login</div></div><div class="card"><p class="notice">Admin login: <b>admin</b> / <b>admin123</b></p><form id="login"><label>Username<input name="u" autocomplete="username" required></label><label>Password<input name="p" type="password" autocomplete="current-password" required></label><button class="btn" style="width:100%">Login</button></form></div></div><script type="module">import{ADMIN_KEY,ADMIN_USERNAME,ADMIN_PASSWORD,formData,toast}from'./js/app.js';login.onsubmit=e=>{e.preventDefault();const d=formData(login);if(d.u===ADMIN_USERNAME&&d.p===ADMIN_PASSWORD){localStorage.setItem(ADMIN_KEY,'yes');location.href='admin/'}else toast('Wrong admin login')};</script></body></html>
