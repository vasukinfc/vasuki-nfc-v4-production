<body>
  <main class="wrap">
    <section class="card">
      <div class="top">
        <div class="brand">VASUKI NFC</div>
        <h1>Track Your Order</h1>
        <p>Check your NFC card order status using the secure tracking token provided after payment.</p>
      </div>

      <div class="body">
        <form id="trackForm">
          <div>
            <div>
              <label for="token">Secure Tracking Token</label>
              <input id="token" placeholder="vsk_track_..." autocomplete="off" />
            </div>
          </div>

          <button type="submit">Check Status</button>
        </form>

        <div id="result" class="result"></div>

        <div class="links">
          <a href="/">Home</a>
          <a href="/collection.html">Collection</a>
          <a href="/design.html">Design Card</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const initialToken = params.get('token') || '';

    $('token').value = initialToken;

    function escapeHtml(value){
      return String(value ?? '').replace(/[&<>'"]/g, ch => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        "'":'&#39;',
        '"':'&quot;'
      }[ch]));
    }

    function dateText(value){
      if(!value) return '-';
      const d = new Date(value);
      return isNaN(d.getTime()) ? '-' : d.toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });
    }

    function statusText(status){
      if(status === 'PAID' || status === 'SUCCESS') return 'Payment successful, order received';
      if(status === 'CREATED') return 'Payment pending';
      return status || 'Order received';
    }

    function orderCard(order){
      const items = Array.isArray(order.items) && order.items.length
        ? order.items.map(i => `${escapeHtml(i.name)} × ${escapeHtml(i.qty || 1)}`).join(', ')
        : '-';

      return `<div class="box">
        <div><b>Status:</b> <span class="status">${escapeHtml(statusText(order.status))}</span></div>
        <div><b>Items:</b> ${items}</div>
        <div><b>Order Date:</b> ${dateText(order.createdAt)}</div>
      </div>`;
    }

    async function trackOrder(){
      const token = $('token').value.trim();
      const result = $('result');

      if(!token){
        result.innerHTML = '<div class="box error">Enter your secure tracking token.</div>';
        return;
      }

      const query = new URLSearchParams();
      query.set('token', token);

      result.innerHTML = '<div class="box loading">Checking order status...</div>';

      try{
        const authToken = localStorage.getItem('vasukiAuthToken');
        const res = await fetch('/api/orders?' + query.toString(), {
          headers: authToken ? { Authorization: `Bearer ${authToken}` } : {},
        });
        const data = await res.json();

        if(!res.ok) throw new Error(data.error || 'Unable to load order status');

        if(!Array.isArray(data) || !data.length){
          result.innerHTML = '<div class="box error">Unable to locate this order. Check your secure tracking token and try again.</div>';
          return;
        }

        result.innerHTML = data.map(orderCard).join('');
      }catch(err){
        result.innerHTML = '<div class="box error">' + escapeHtml(err.message || 'Something went wrong') + '</div>';
      }
    }

    $('trackForm').addEventListener('submit', function(e){
      e.preventDefault();
      trackOrder();
    });

    if(initialToken) trackOrder();
  </script>
</body>
