<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#131921">
  <meta name="robots" content="noindex">
  <title>Digital Card Offline | VASUKI NFC</title>
  <style>
    *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:#f4f6f8;color:#172033;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.box{width:min(100%,480px);padding:32px;border:1px solid #dfe3e8;border-radius:18px;background:#fff;text-align:center;box-shadow:0 18px 48px rgba(15,23,42,.08)}.mark{display:grid;width:54px;height:54px;margin:0 auto 18px;place-items:center;border-radius:15px;background:#131921;color:#febd69;font-weight:900}.box h1{margin:0 0 10px}.box p{margin:0 0 20px;color:#657184;line-height:1.6}.box button,.box a{display:inline-flex;min-height:44px;align-items:center;justify-content:center;margin:4px;padding:10px 16px;border:0;border-radius:9px;background:#232f3e;color:#fff;font:inherit;font-weight:800;text-decoration:none;cursor:pointer}.box a{background:#f3a847;color:#111}
  </style>
</head>
<body>
  <main class="box">
    <div class="mark" aria-hidden="true">V</div>
    <h1>You’re offline</h1>
    <p>Reconnect to open this digital card. Previously viewed cards may become available after you retry.</p>
    <button type="button" onclick="location.reload()">Try again</button>
    <a href="/">VASUKI NFC home</a>
  </main>
</body>
</html>
