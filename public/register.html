<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Create your VASUKI NFC account and verify your email before checkout.">

<title>Register | VASUKI NFC</title>
<link rel="canonical" href="https://vasukinfc.in/register.html">

<link rel="icon" type="image/png" href="/assets/vasuki-favicon.png">
<link rel="shortcut icon" href="/assets/favicon.ico">
<link rel="apple-touch-icon" href="/assets/vasuki-favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  font-family:Poppins,sans-serif;
  background:linear-gradient(135deg,#131921,#232f3e);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:430px;
  background:#fff;
  border-radius:18px;
  padding:28px;
  box-shadow:0 20px 70px rgba(0,0,0,.35);
}

.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo h1{
  color:#f3a847;
  font-size:30px;
  font-weight:900;
  letter-spacing:2px;
}

.logo p{
  color:#565959;
  font-size:13px;
}

.group{
  margin-bottom:14px;
}

label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#222;
}

input{
  width:100%;
  padding:13px 14px;
  border:1px solid #ddd;
  border-radius:10px;
  font-family:inherit;
  outline:none;
}

input:focus{
  border-color:#f3a847;
}

button{
  width:100%;
  border:0;
  border-radius:10px;
  padding:13px;
  font-family:inherit;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,#febd69,#f3a847);
  color:#111;
  margin-top:8px;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.msg{
  margin-top:12px;
  font-size:13px;
  text-align:center;
  min-height:20px;
}

.msg.ok{
  color:#0a7a2f;
}

.msg.err{
  color:#b12704;
}

.switch{
  margin-top:18px;
  font-size:13px;
  text-align:center;
  color:#565959;
}

.switch a{
  color:#f3a847;
  font-weight:700;
  text-decoration:none;
}

.back{
  display:block;
  text-align:center;
  margin-top:12px;
  color:#565959;
  text-decoration:none;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">
  <div class="logo">
    <h1>VASUKI NFC</h1>
    <p>Create your account to order NFC cards</p>
  </div>

  <form id="registerForm">
    <div class="group">
      <label>Full Name</label>
      <input id="fullName" type="text" placeholder="Enter your name" required>
    </div>

    <div class="group">
      <label>Mobile Number</label>
      <input id="mobile" type="tel" placeholder="10 digit mobile number" maxlength="10" required>
    </div>

    <div class="group">
      <label>Email Address</label>
      <input id="email" type="email" placeholder="you@example.com" required>
    </div>

    <div class="group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Minimum 6 characters" required>
    </div>

    <button id="btn" type="submit">Create Account</button>
    <div id="msg" class="msg"></div>
  </form>

  <div class="switch">
    Already have an account? <a href="/login.html">Login</a>
  </div>

  <a class="back" href="/">← Back to Home</a>
</div>

<script>
const form = document.getElementById('registerForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('btn');
let pendingEmail = '';

function showMsg(text, type){
  msg.textContent = text;
  msg.className = 'msg ' + type;
}

const blockedEmailDomains = new Set([
  'mailinator.com','tempmail.com','temp-mail.org','10minutemail.com','guerrillamail.com',
  'yopmail.com','trashmail.com','getnada.com','sharklasers.com','fakeinbox.com',
  'throwawaymail.com','maildrop.cc','dispostable.com','moakt.com','mintemail.com'
]);

function isValidEmail(email){
  const value = String(email || '').trim().toLowerCase();
  if(!value || value.length > 254 || value.includes('..')) return false;
  if(!/^[a-z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-z0-9-]+(?:\.[a-z0-9-]+)+$/i.test(value)) return false;
  const domain = value.split('@')[1];
  return !!domain && !blockedEmailDomains.has(domain);
}

function showOtpBox(email){
  pendingEmail = email;
  let box = document.getElementById('otpBox');
  if(!box){
    box = document.createElement('div');
    box.id = 'otpBox';
    box.style.marginTop = '14px';
    box.innerHTML = `
      <div class="group">
        <label>Email OTP</label>
        <input id="emailOtp" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6 digit OTP" required>
      </div>
      <button id="verifyBtn" type="button">Verify Email</button>
      <button id="resendBtn" type="button" style="margin-top:10px;background:#fff;color:#131921;border:1px solid #d5d9d9">Resend OTP</button>
    `;
    form.appendChild(box);
  }

  document.getElementById('verifyBtn').onclick = verifyEmailOtp;
  document.getElementById('resendBtn').onclick = resendEmailOtp;
}

async function verifyEmailOtp(){
  const otp = document.getElementById('emailOtp').value.trim();
  const verifyBtn = document.getElementById('verifyBtn');
  if(!/^\d{6}$/.test(otp)){
    return showMsg('Please enter the 6 digit OTP sent to your email', 'err');
  }
  verifyBtn.disabled = true;
  verifyBtn.textContent = 'Verifying...';
  try{
    const res = await fetch('/api/verify-email', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ email: pendingEmail, otp })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Email verification failed');

    localStorage.setItem('vasukiAuthToken', data.token);
    localStorage.setItem('vasukiUser', JSON.stringify(data.user || {}));
    showMsg('Email verified and account created successfully ✅', 'ok');

    const back = localStorage.getItem('vasukiReturnAfterLogin');
    localStorage.removeItem('vasukiReturnAfterLogin');
    setTimeout(function(){ window.location.href = back || '/'; }, 800);
  }catch(err){
    showMsg(err.message || 'Email verification failed', 'err');
    verifyBtn.disabled = false;
    verifyBtn.textContent = 'Verify Email';
  }
}

async function resendEmailOtp(){
  const resendBtn = document.getElementById('resendBtn');
  resendBtn.disabled = true;
  resendBtn.textContent = 'Sending...';
  try{
    const res = await fetch('/api/resend-email-otp', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ email: pendingEmail })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Unable to resend OTP');
    showMsg('New OTP sent to your email ✅', 'ok');
  }catch(err){
    showMsg(err.message || 'Unable to resend OTP', 'err');
  }finally{
    resendBtn.disabled = false;
    resendBtn.textContent = 'Resend OTP';
  }
}

form.addEventListener('submit', async function(e){
  e.preventDefault();

  const fullName = document.getElementById('fullName').value.trim();
  const mobile = document.getElementById('mobile').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if(!fullName){
    return showMsg('Name is required', 'err');
  }

  if(!/^[0-9]{10}$/.test(mobile)){
    return showMsg('Mobile number must be 10 digits', 'err');
  }

  if(!isValidEmail(email)){
    return showMsg('Please enter a real email address. Temporary/fake email is not allowed.', 'err');
  }

  if(password.length < 6){
    return showMsg('Password must be at least 6 characters', 'err');
  }

  btn.disabled = true;
  btn.textContent = 'Sending OTP...';

  try{
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName, mobile, email, password })
    });

    const data = await res.json();
    if(!res.ok){
      throw new Error(data.error || 'Register failed');
    }

    if(data.verifyRequired){
      showMsg(data.message || 'OTP sent to your email. Please verify to activate your account.', 'ok');
      showOtpBox(data.email || email);
      btn.textContent = 'OTP Sent';
      return;
    }

    throw new Error('Verification response missing. Please try again.');
  }catch(err){
    showMsg(err.message || 'Register failed', 'err');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>

</body>
</html>
